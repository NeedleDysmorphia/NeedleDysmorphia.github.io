<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME ARTISTA | Abisso Astratto</title>
    <style>
        /* RESET BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #888;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            height: 100vh;
        }

        /* ANIMAZIONE BATTITO PER IL TESTO */
        @keyframes text-pulse {
            0% { transform: scale(1); filter: brightness(1); }
            10% { transform: scale(1.03); filter: brightness(1.8) drop-shadow(0 0 8px #8b0000); }
            20% { transform: scale(1); filter: brightness(1.2); }
            30% { transform: scale(1.06); filter: brightness(2) drop-shadow(0 0 12px #ff0000); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .pulsate {
            animation: text-pulse 1.3s infinite ease-in-out;
            display: inline-block;
        }

        /* NAVIGAZIONE */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 25px; text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #200;
        }

        nav a {
            color: #400;
            text-decoration: none;
            margin: 0 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: color 0.4s;
        }

        nav a:hover { color: #8b0000; }

        /* SEZIONI */
        section {
            padding: 140px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            color: #8b0000;
            font-size: clamp(2.5rem, 10vw, 5rem);
            letter-spacing: 20px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h2 {
            color: #500;
            letter-spacing: 10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .testo-artistico {
            max-width: 700px;
            line-height: 2.2;
            white-space: pre-line;
            font-style: italic;
            color: #666;
            padding: 30px;
        }

        /* SCHERMO INIZIALE */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: #8b0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }

        .grid-opere {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
        }

        .box-opera {
            border: 1px solid #111;
            padding: 40px;
            background: #050505;
        }

    </style>
</head>
<body>

    <div id="start-screen">
        <h2 class="pulsate">ENTRA NELL'ABISSO</h2>
        <p style="color: #222; margin-top: 20px; letter-spacing: 3px; font-size: 0.7rem;">(Attiva la frequenza)</p>
    </div>

    <nav>
        <a href="#home">Ingresso</a>
        <a href="#opere">Abissi</a>
        <a href="#poesie">Echi</a>
        <a href="#bio">Ombra</a>
    </nav>

    <section id="home">
        <h1 class="pulsate">NOME ARTISTA</h1>
        <p style="letter-spacing: 8px; color: #333; font-size: 0.9rem;">VISIONI ASTRATTE</p>
    </section>

    <section id="opere">
        <h2 class="pulsate">Abissi</h2>
        <div class="grid-opere">
            <div class="box-opera">
                <p>OPERA I</p>
                <p style="color: #222; font-size: 0.7rem; margin-top: 10px;">CARNE E TELA</p>
            </div>
            </div>
    </section>

    <section id="poesie">
        <h2 class="pulsate">Echi</h2>
        <div class="testo-artistico">
            Inserisci qui i tuoi versi.
            Andando a capo, il sito 
            manterrà la tua formattazione.
        </div>
    </section>

    <section id="bio">
        <h2 class="pulsate">L'Ombra</h2>
        <div class="testo-artistico">La tua biografia qui.</div>
    </section>

    <script>
        let audioCtx;

        function playHeartbeat() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            
            const stroke = (time, freq, vol, dur) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + dur);
                gain.gain.setValueAtTime(vol, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + dur);
            };

            // Battito profondo sincronizzato (1.3s)
            stroke(now, 50, 0.8, 0.4);      // Tum
            stroke(now + 0.25, 40, 0.6, 0.5); // Tum
        }

        document.getElementById('start-screen').addEventListener('click', function() {
            this.style.display = 'none';
            playHeartbeat();
            setInterval(playHeartbeat, 1300);
        });
    </script>

</body>
</html>
