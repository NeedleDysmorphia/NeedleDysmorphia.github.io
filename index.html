<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME ARTISTA | Battito Astratto</title>
    <style>
        /* RESET E STILE BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #b0b0b0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            height: 100vh;
        }

        /* ANIMAZIONE DI PULSAZIONE PER IL TESTO */
        @keyframes text-beat {
            0% { transform: scale(1); filter: brightness(1); }
            10% { transform: scale(1.02); filter: brightness(1.5) drop-shadow(0 0 5px #8b0000); }
            20% { transform: scale(1); filter: brightness(1.2); }
            30% { transform: scale(1.05); filter: brightness(1.8) drop-shadow(0 0 10px #ff0000); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .beat-effect {
            animation: text-beat 1.2s infinite ease-in-out;
            display: inline-block;
        }

        /* NAVIGAZIONE */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.95);
            padding: 25px; text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #300;
        }

        nav a {
            color: #440000;
            text-decoration: none;
            margin: 0 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover { color: #ff0000; }

        /* SEZIONI */
        section {
            padding: 140px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            color: #8b0000;
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        h2 {
            color: #600;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .testo-artistico {
            max-width: 700px;
            line-height: 2.2;
            white-space: pre-line;
            font-style: italic;
            border-left: 1px solid #300;
            padding-left: 20px;
            margin: 20px 0;
        }

        /* SCHERMO DI INGRESSO */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: #8b0000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            text-align: center;
        }

        /* GALLERIA MINI */
        .grid-opere {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        .opera-box {
            border: 1px solid #200;
            padding: 20px;
            background: #050505;
        }

    </style>
</head>
<body>

    <div id="start-screen">
        <h2 class="beat-effect">ENTRA NELL'ABISSO</h2>
        <p style="color: #333; margin-top: 15px; letter-spacing: 2px;">(Clicca per risvegliare il battito)</p>
    </div>

    <nav>
        <a href="#home">Ingresso</a>
        <a href="#opere">Abissi</a>
        <a href="#poesie">Echi</a>
    </nav>

    <section id="home">
        <h1 class="beat-effect">NOME ARTISTA</h1>
        <p style="letter-spacing: 5px; color: #444;">Arte Viscerale Astratta</p>
    </section>

    <section id="opere">
        <h2 class="beat-effect">Abissi</h2>
        <div class="grid-opere">
            <div class="opera-box">
                <p>OPERA I</p>
                <p style="color: #444; font-size: 0.8rem;">Disponibile</p>
            </div>
        </div>
    </section>

    <section id="poesie">
        <h2 class="beat-effect">Echi</h2>
        <div class="testo-artistico">
            "Il vuoto non è silenzio.
            È un battito che non vedi,
            ma che muove ogni ombra
            sulla tela della tua mente."
        </div>
    </section>

    <script>
        let audioCtx;

        function playHeartbeat() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            
            const stroke = (time, freq, vol, dur) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + dur);
                gain.gain.setValueAtTime(vol, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(time);
                osc.stop(time + dur);
            };

            // Battito "Tum-Tum" sincronizzato con l'animazione 1.2s
            stroke(now, 55, 0.7, 0.4);      // Primo battito
            stroke(now + 0.25, 45, 0.5, 0.5); // Secondo battito
        }

        document.getElementById('start-screen').addEventListener('click', function() {
            this.style.display = 'none';
            playHeartbeat();
            setInterval(playHeartbeat, 1200);
        });
    </script>

</body>
</html>
