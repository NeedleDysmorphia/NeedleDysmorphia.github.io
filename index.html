<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOME ARTISTA | Abisso Viscerale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #b0b0b0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* IL CUORE ANATOMICO GENERATO DA CODICE */
        #heart-container {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            opacity: 0.25;
            animation: organic-pulse 1.3s infinite ease-in-out;
        }

        /* Massa principale - asimmetrica e profonda */
        .organ {
            position: relative;
            width: 160px;
            height: 200px;
            background: #4a0000;
            /* Forma irregolare "a sacco" */
            border-radius: 42% 58% 46% 54% / 61% 41% 59% 39%;
            box-shadow: 
                inset 20px -30px 50px #1a0000,
                inset -10px 10px 30px #8b0000,
                0 0 60px #2a0000;
            filter: blur(1px);
        }

        /* Vena Aorta (tubo superiore) */
        .vessel-top {
            position: absolute;
            top: -30px; left: 40px;
            width: 35px; height: 80px;
            background: #330000;
            border-radius: 10px 10px 0 0;
            transform: rotate(-10deg);
            box-shadow: inset -5px 0 10px #000;
        }

        /* Altra vena laterale */
        .vessel-side {
            position: absolute;
            top: 10px; right: -20px;
            width: 25px; height: 60px;
            background: #3a0000;
            border-radius: 50%;
            transform: rotate(45deg);
            box-shadow: inset 5px 0 10px #000;
        }

        @keyframes organic-pulse {
            0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
            10% { transform: translate(-50%, -50%) scale(1.08) rotate(1deg); filter: brightness(1.3); }
            30% { transform: translate(-50%, -50%) scale(1.02); filter: brightness(1.1); }
            45% { transform: translate(-50%, -50%) scale(1.12) rotate(-1deg); filter: brightness(1.4); }
            100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
        }

        /* OVERLAY E NAVIGAZIONE */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 25px; text-align: center;
            z-index: 1000; border-bottom: 1px solid #300;
        }

        nav a {
            color: #600; text-decoration: none; margin: 0 15px;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px;
        }

        section { padding: 140px 20px; min-height: 100vh; text-align: center; }

        h1 { color: #8b0000; letter-spacing: 10px; margin-bottom: 50px; }

        /* SCHERMO INIZIALE */
        #start {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #8b0000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start">
        <h2>ENTRA NELL'ABISSO</h2>
        <p style="color: #333; margin-top: 10px;">(Attiva il battito)</p>
    </div>

    <div id="heart-container">
        <div class="vessel-top"></div>
        <div class="vessel-side"></div>
        <div class="organ"></div>
    </div>

    <nav>
        <a href="#home">Ingresso</a>
        <a href="#opere">Abissi</a>
        <a href="#poesie">Echi</a>
    </nav>

    <section id="home">
        <h1>NOME ARTISTA</h1>
        <p>Arte Viscerale</p>
    </section>

    <script>
        let audioCtx;
        function playBeat() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const stroke = (time, freq, vol) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.4);
                gain.gain.setValueAtTime(vol, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + 0.4);
            };
            stroke(now, 50, 0.6);      // Batte cupo
            stroke(now + 0.22, 40, 0.4); 
        }

        document.getElementById('start').addEventListener('click', function() {
            this.style.display = 'none';
            playBeat();
            setInterval(playBeat, 1300);
        });
    </script>

</body>
</html>
