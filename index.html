<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Astratto Horror</title>

    <style>
        /* RESET: serve per togliere i margini di default che rovinano tutto */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050505;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            scroll-behavior: smooth; /* Rende lo scorrimento tra sezioni fluido */
        }

        /* MENU FISSO IN ALTO */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            text-align: center;
            z-index: 1000;
            border-bottom: 1px solid #330000;
        }

        nav a {
            color: #8b0000;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* SEZIONI */
        section {
            padding: 120px 20px; /* Spazio per non finire sotto il menu */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        h1, h2 { color: #8b0000; margin-bottom: 30px; letter-spacing: 5px; }

        /* GRIGLIA OPERE */
        .container-opere {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .pezzo {
            background: #000;
            border: 1px solid #333;
            padding: 10px;
            width: 300px;
            text-align: center;
        }

        .pezzo img {
            width: 100%;
            height: auto;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        .prezzo { color: #8b0000; font-weight: bold; margin: 10px 0; }

        /* POESIE E BIO */
        .testo-artistico {
            max-width: 700px;
            line-height: 1.8;
            text-align: center;
            white-space: pre-line; /* Fondamentale per le poesie! */
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Ingresso</a>
        <a href="#opere">Abissi (Opere)</a>
        <a href="#poesie">Echi (Poesie)</a>
        <a href="#bio">L'Ombra (Bio)</a>
    </nav>

    <section id="home">
        <h1>NOME ARTISTA</h1>
        <p>L'astrazione dell'orrore.</p>
    </section>

    <section id="opere">
        <h2>OPERE DISPONIBILI</h2>
        <div class="container-opere">
            <div class="pezzo">
                <img src="opera1.jpg" alt="Titolo">
                <p>NOME OPERA</p>
                <p class="prezzo">€ 00.00</p>
                <a href="mailto:tua@email.com" style="color:white; font-size: 0.7rem;">CONTATTA PER ACQUISTO</a>
            </div>
        </div>
    </section>

    <section id="poesie">
        <h2>POESIE</h2>
        <div class="testo-artistico">
            Qui scriverai la tua prima poesia.
            Basta andare a capo normalmente.
        </div>
    </section>

    <section id="bio">
        <h2>BIOGRAFIA</h2>
        <p class="testo-artistico">Qui racconterai chi sei.</p>
    </section>

</body>
</html>
